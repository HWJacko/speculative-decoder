name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-benchmark:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install ".[dev]"

      - name: Test
        run: pytest

      - name: Run deterministic sample benchmark
        run: speculative-bench run --out reports --repeats 3 --warmups 1

      - name: Upload benchmark reports
        uses: actions/upload-artifact@v4
        with:
          name: speculative-decoding-benchmark-reports-py${{ matrix.python-version }}
          path: reports/
